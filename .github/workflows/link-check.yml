name: Link Check

on:
  schedule:
    # Run weekly on Sunday at 3:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '**.md'
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lychee
        run: npm install -g lychee

      - name: Cache lychee
        uses: actions/cache@v4
        with:
          path: ~/.cache/lychee
          key: lychee-cache-${{ hashFiles('**/*.md') }}
          restore-keys: |
            lychee-cache-

      - name: Run lychee link checker
        run: |
          lychee --no-progress --cache --max-concurrency 5 --header "User-Agent: lychee/1.0" "**/*.md"
        continue-on-error: true

      - name: Report failures
        if: failure()
        run: |
          echo "::warning::Some links may be broken. Check the lychee report above."
          exit 1