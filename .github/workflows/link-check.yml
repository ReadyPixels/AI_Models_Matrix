name: Link Check

on:
  schedule:
    # Run weekly on Sunday at 3:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '**.md'
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lychee
        run: |
          curl -sSfL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin

      - name: Run lychee link checker
        run: |
          lychee --no-progress --cache --max-concurrency 5 --header "User-Agent: lychee/1.0" "**/*.md" || true
